# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: 
        - 'main'
        - 'RELEASE-*'
  pull_request:
    branches:
        - 'main'
        - 'RELEASE-*'

permissions:
  contents: read

jobs:
  build:

    strategy:
      matrix:
        java-version: [ '21', '25' ]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven
    - name: Build project
      run: mvn -B install --file pom.xml

  relocate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Set up JDK 21
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven
    - name: Build relocation
      run: mvn -B package --file relocation/pom.xml

  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Set up JDK 21
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven
    - name: Analyze starters
      # Note: the starter is always 1 version ahead of what is in maven central
      # therefore, when we analyze the starters we need to force a prior version
      run: mvn dependency:analyze -Djakarta.concurrency.groupid=jakarta.enterprise.concurrent -Djakarta.concurrency.version=3.1.1 --file tck-dist/src/main/starter/pom.xml
